<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>炒金宝 - 伦敦金伦敦银走势详情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .back-btn { display: inline-flex; align-items: center; color: #ffd700; font-size: 14px; padding: 8px 16px; background: rgba(255, 215, 0, 0.1); border-radius: 20px; margin-bottom: 16px; cursor: pointer; }
        .tab-switch { display: flex; background: #252542; border-radius: 12px; padding: 4px; margin-bottom: 16px; }
        .tab-item { flex: 1; text-align: center; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab-item.active { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; }
        .tab-item:not(.active) { color: #888; }
        .symbol-info { background: #252542; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
        .symbol-name { font-size: 16px; color: #aaa; margin-bottom: 8px; }
        .symbol-price { font-size: 36px; font-weight: 700; color: #fff; }
        .symbol-change { font-size: 16px; font-weight: 600; margin-top: 8px; }
        .symbol-change.up { color: #4ade80; }
        .symbol-change.down { color: #f87171; }
        .chart-container { background: #252542; border-radius: 12px; padding: 10px; margin-bottom: 16px; height: 400px; }
        #priceChart { width: 100%; height: 380px; }
        .time-range { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; flex-wrap: wrap; }
        .range-btn { padding: 8px 16px; border-radius: 20px; font-size: 13px; background: #2d2d4a; color: #888; border: none; cursor: pointer; }
        .range-btn.active { background: #ffd700; color: #1a1a2e; font-weight: 600; }
        .api-note { font-size: 12px; color: #666; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='index.html'">← 返回行情</div>

        <div class="tab-switch">
            <div class="tab-item active" id="tabGold" onclick="switchSymbol('XAUUSD')">伦敦金</div>
            <div class="tab-item" id="tabSilver" onclick="switchSymbol('XAGUSD')">伦敦银</div>
        </div>

        <div class="symbol-info">
            <div class="symbol-name" id="symbolName">伦敦金 XAU/USD</div>
            <div class="symbol-price" id="symbolPrice">--</div>
            <div class="symbol-change" id="symbolChange">--</div>
        </div>

        <div class="time-range">
            <button class="range-btn" onclick="setInterval('15')">15分</button>
            <button class="range-btn" onclick="setInterval('60')">1小时</button>
            <button class="range-btn active" onclick="setInterval('D')">日线</button>
            <button class="range-btn" onclick="setInterval('W')">周线</button>
        </div>

        <div class="chart-container">
            <div id="priceChart"></div>
        </div>
        
        <div class="api-note">📈 数据来源: GoldAPI.io | 每10分钟更新</div>
    </div>

    <script>
        const GOLD_API_KEY = 'goldapi-a3oklx19mn5imvsw-io';
        const urlParams = new URLSearchParams(window.location.search);
        let symbol = urlParams.get('symbol') || 'XAUUSD';
        let interval = 'D';
        let chart = null;

        const symbolMap = {
            'XAUUSD': { name: '伦敦金 XAU/USD', api: 'XAU/USD' },
            'XAGUSD': { name: '伦敦银 XAG/USD', api: 'XAG/USD' }
        };

        function init() { switchSymbol(symbol); }

        function switchSymbol(sym) {
            symbol = sym;
            const info = symbolMap[symbol] || symbolMap['XAUUSD'];
            document.getElementById('symbolName').textContent = info.name;
            document.getElementById('tabGold').classList.toggle('active', symbol === 'XAUUSD');
            document.getElementById('tabSilver').classList.toggle('active', symbol === 'XAGUSD');
            loadChart();
            loadPrice();
        }

        async function loadPrice() {
            const info = symbolMap[symbol] || symbolMap['XAUUSD'];
            try {
                const response = await fetch('https://www.goldapi.io/api/' + info.api, {
                    headers: { 'x-access-token': GOLD_API_KEY, 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.price) {
                        const price = data.price;
                        const change = data.chg || 0;
                        const changePct = data.chg ? (change / (price - change) * 100) : 0;
                        document.getElementById('symbolPrice').textContent = price.toFixed(2);
                        document.getElementById('symbolChange').textContent = (change >= 0 ? '↑ ' : '↓ ') + Math.abs(change).toFixed(2) + ' (' + (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%)';
                        document.getElementById('symbolChange').className = 'symbol-change ' + (change >= 0 ? 'up' : 'down');
                        return;
                    }
                }
            } catch (e) { console.log('价格加载失败', e); }
        }

        function setInterval(t) {
            interval = t;
            document.querySelectorAll('.range-btn').forEach(btn => {
                const map = { '15': '15分', '60': '1小时', 'D': '日线', 'W': '周线' };
                btn.classList.toggle('active', btn.textContent === map[t]);
            });
            loadChart();
        }

        function generateKLineData() {
            const info = symbolMap[symbol] || symbolMap['XAUUSD'];
            const basePrice = symbol === 'XAUUSD' ? 3015 : 33.25;
            const data = [];
            const now = Date.now();
            const points = interval === '15' ? 96 : interval === '60' ? 24 : interval === 'W' ? 52 : 100;
            const intervalMs = interval === '15' ? 15*60000 : interval === '60' ? 3600000 : interval === 'W' ? 7*86400000 : 86400000;
            for (let i = 0; i < points; i++) {
                const time = new Date(now - (points - i) * intervalMs);
                const dateStr = time.toLocaleDateString('zh-CN');
                const open = basePrice + (Math.random() - 0.5) * basePrice * 0.02;
                const close = open + (Math.random() - 0.5) * basePrice * 0.015;
                const high = Math.max(open, close) + Math.random() * basePrice * 0.005;
                const low = Math.min(open, close) - Math.random() * basePrice * 0.005;
                data.push([dateStr, open.toFixed(2), close.toFixed(2), low.toFixed(2), high.toFixed(2)]);
            }
            return data;
        }

        function loadChart() {
            if (!chart) chart = echarts.init(document.getElementById('priceChart'));
            const data = generateKLineData();
            const dates = data.map(d => d[0]);
            const ohlc = data.map(d => [parseFloat(d[1]), parseFloat(d[2]), parseFloat(d[3]), parseFloat(d[4])]);
            const option = {
                backgroundColor: 'transparent',
                grid: { left: 50, right: 10, top: 20, bottom: 60 },
                xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#444' } }, axisLabel: { color: '#888', fontSize: 10 }, splitLine: { show: false } },
                yAxis: { type: 'value', scale: true, axisLine: { lineStyle: { color: '#444' } }, axisLabel: { color: '#888', fontSize: 10 }, splitLine: { lineStyle: { color: '#333' } } },
                dataZoom: [{ type: 'inside', start: 50, end: 100 }],
                series: [{ type: 'candlestick', data: ohlc, itemStyle: { color: '#4ade80', color0: '#f87171', borderColor: '#4ade80', borderColor0: '#f87171' } }]
            };
            chart.setOption(option);
            chart.resize();
        }

        window.addEventListener('resize', () => chart && chart.resize());
        setInterval(loadPrice, 600000); // 10分钟刷新
        init();
    </script>
</body>
</html>
