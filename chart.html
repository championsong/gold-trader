<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>炒金宝 - 伦敦金伦敦银实时走势</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }

        /* 顶部切换 */
        .tab-switch { display: flex; background: #252542; border-radius: 12px; padding: 4px; margin-bottom: 16px; }
        .tab-item { flex: 1; text-align: center; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab-item.active { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; }
        .tab-item:not(.active) { color: #888; }

        /* 返回按钮 */
        .back-btn { display: inline-flex; align-items: center; color: #ffd700; font-size: 14px; padding: 8px 16px; background: rgba(255, 215, 0, 0.1); border-radius: 20px; margin-bottom: 16px; cursor: pointer; }

        /* 价格信息 */
        .price-info { text-align: center; padding: 20px; background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%); border-radius: 16px; margin-bottom: 16px; }
        .current-price { font-size: 42px; font-weight: 700; color: #fff; }
        .price-change { font-size: 18px; font-weight: 600; margin-top: 8px; }
        .price-change.up { color: #4ade80; }
        .price-change.down { color: #f87171; }
        .update-time { font-size: 12px; color: #888; margin-top: 8px; }

        /* K线图 */
        .chart-container { background: #252542; border-radius: 16px; padding: 16px; height: 400px; }
        #priceChart { width: 100%; height: 380px; }

        /* 时间周期 */
        .time-range { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
        .range-btn { padding: 6px 14px; border-radius: 16px; font-size: 12px; background: #2d2d4a; color: #888; border: none; cursor: pointer; }
        .range-btn.active { background: #ffd700; color: #1a1a2e; }

        /* 统计信息 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .stat-item { background: #252542; border-radius: 12px; padding: 14px; text-align: center; }
        .stat-label { font-size: 11px; color: #888; margin-bottom: 6px; }
        .stat-value { font-size: 16px; font-weight: 600; color: #fff; }
        .stat-value.up { color: #4ade80; }
        .stat-value.down { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='index.html'">← 返回行情</div>

        <!-- 切换伦敦金/银 -->
        <div class="tab-switch">
            <div class="tab-item active" id="tabGold" onclick="switchSymbol('XAUUSD')">伦敦金</div>
            <div class="tab-item" id="tabSilver" onclick="switchSymbol('XAGUSD')">伦敦银</div>
        </div>

        <!-- 价格信息 -->
        <div class="price-info">
            <div class="current-price" id="currentPrice">--</div>
            <div class="price-change" id="priceChange">--</div>
            <div class="update-time">更新时间: <span id="lastUpdate">--:--:--</span></div>
        </div>

        <!-- 时间周期 -->
        <div class="time-range">
            <button class="range-btn" onclick="setRange('1H')">1小时</button>
            <button class="range-btn active" onclick="setRange('1D')">1日</button>
            <button class="range-btn" onclick="setRange('1W')">1周</button>
            <button class="range-btn" onclick="setRange('1M')">1月</button>
        </div>

        <!-- K线图 -->
        <div class="chart-container">
            <div id="priceChart"></div>
        </div>

        <!-- 统计信息 -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">最高</div>
                <div class="stat-value" id="highPrice">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最低</div>
                <div class="stat-value" id="lowPrice">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">涨跌幅</div>
                <div class="stat-value" id="changePct">--</div>
            </div>
        </div>
    </div>

    <script>
        let currentSymbol = 'XAUUSD';
        let currentRange = '1D';
        let chart = null;

        // 模拟数据（实际需接入真实API）
        function generateMockData(symbol) {
            const basePrice = symbol === 'XAUUSD' ? 3015 : 33.25;
            const data = [];
            const now = Date.now();
            const points = symbol === 'XAUUSD' ? 100 : 80;
            
            for (let i = 0; i < points; i++) {
                const time = now - (points - i) * 3600000;
                const open = basePrice + (Math.random() - 0.5) * 20;
                const close = open + (Math.random() - 0.5) * 10;
                const high = Math.max(open, close) + Math.random() * 5;
                const low = Math.min(open, close) - Math.random() * 5;
                data.push([time, open, close, low, high]);
            }
            return data;
        }

        function initChart() {
            chart = echarts.init(document.getElementById('priceChart'));
            loadData();
        }

        function loadData() {
            const data = generateMockData(currentSymbol);
            const times = data.map(d => new Date(d[0]).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }));
            const ohlc = data.map(d => d.slice(1));
            
            // 更新价格
            const latest = data[data.length - 1];
            const prev = data[data.length - 2];
            const currentPrice = latest[1];
            const change = currentPrice - prev[1];
            const changePct = (change / prev[1] * 100).toFixed(2);
            
            document.getElementById('currentPrice').textContent = currentPrice.toFixed(2);
            document.getElementById('priceChange').textContent = (change >= 0 ? '↑ ' : '↓ ') + Math.abs(change).toFixed(2) + ' (' + (changePct >= 0 ? '+' : '') + changePct + '%)';
            document.getElementById('priceChange').className = 'price-change ' + (change >= 0 ? 'up' : 'down');
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');

            // 统计
            const highs = data.map(d => d[3]);
            const lows = data.map(d => d[2]);
            document.getElementById('highPrice').textContent = Math.max(...highs).toFixed(2);
            document.getElementById('lowPrice').textContent = Math.min(...lows).toFixed(2);
            document.getElementById('changePct').textContent = (changePct >= 0 ? '+' : '') + changePct + '%';
            document.getElementById('changePct').className = 'stat-value ' + (change >= 0 ? 'up' : 'down');

            // K线图
            const option = {
                backgroundColor: 'transparent',
                grid: { left: 50, right: 20, top: 20, bottom: 60 },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLine: { lineStyle: { color: '#444' } },
                    axisLabel: { color: '#888', fontSize: 10 },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    axisLine: { lineStyle: { color: '#444' } },
                    axisLabel: { color: '#888', fontSize: 10 },
                    splitLine: { lineStyle: { color: '#333' } }
                },
                dataZoom: [{ type: 'inside', start: 60, end: 100 }],
                series: [{
                    type: 'candlestick',
                    data: ohlc,
                    itemStyle: {
                        color: '#4ade80',
                        color0: '#f87171',
                        borderColor: '#4ade80',
                        borderColor0: '#f87171'
                    }
                }]
            };
            chart.setOption(option);
        }

        function switchSymbol(symbol) {
            currentSymbol = symbol;
            document.getElementById('tabGold').classList.toggle('active', symbol === 'XAUUSD');
            document.getElementById('tabSilver').classList.toggle('active', symbol === 'XAGUSD');
            loadData();
        }

        function setRange(range) {
            currentRange = range;
            document.querySelectorAll('.range-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(range === '1H' ? '1小时' : range === '1D' ? '1日' : range === '1W' ? '1周' : '1月'));
            });
            loadData();
        }

        window.addEventListener('resize', () => chart && chart.resize());
        
        // 30秒自动刷新
        setInterval(loadData, 30000);
        
        initChart();
    </script>
</body>
</html>
