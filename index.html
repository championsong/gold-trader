<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>炒金宝 - 伦敦金伦敦银实时行情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }

        /* 价格区域 */
        .price-section { padding: 20px; background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%); border-radius: 16px; margin-bottom: 16px; }
        .price-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .price-title { font-size: 18px; font-weight: 600; color: #ffd700; }
        .update-time { font-size: 12px; color: #888; }
        .price-cards { display: flex; gap: 12px; }
        .price-card { flex: 1; background: linear-gradient(135deg, #2d2d4a 0%, #1f1f3a 100%); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .price-card:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2); }
        .price-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .price-card.gold::before { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .price-card.silver::before { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .card-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .card-price { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .card-change { font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .card-change.up { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
        .card-change.down { color: #f87171; background: rgba(248, 113, 113, 0.15); }

        /* 快讯区域 */
        .news-section { padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 18px; font-weight: 600; color: #fff; }
        .section-tag { font-size: 11px; color: #666; background: #2d2d4a; padding: 4px 10px; border-radius: 10px; }
        .news-list { display: flex; flex-direction: column; gap: 10px; }
        .news-item { background: #252542; border-radius: 12px; padding: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
        .news-item:active { background: #2d2d4a; transform: scale(0.98); }
        .news-content { flex: 1; margin-right: 12px; }
        .news-title { font-size: 14px; color: #fff; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { display: flex; gap: 10px; font-size: 11px; color: #888; }
        .news-sentiment { font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }

        /* 利多颜色 - 红色 */
        .news-sentiment.bullish.high { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.4); }
        .news-sentiment.bullish.medium { background: rgba(248, 113, 113, 0.15); color: #fca5a5; }
        .news-sentiment.bullish.low { background: rgba(248, 113, 113, 0.1); color: #fecaca; }
        /* 利空颜色 - 绿色 */
        .news-sentiment.bearish.high { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.4); }
        .news-sentiment.bearish.medium { background: rgba(74, 222, 128, 0.15); color: #86efac; }
        .news-sentiment.bearish.low { background: rgba(74, 222, 128, 0.1); color: #bbf7d0; }
        /* 中性颜色 */
        .news-sentiment.neutral.high { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.4); }
        .news-sentiment.neutral.medium { background: rgba(251, 191, 36, 0.15); color: #fcd34d; }
        .news-sentiment.neutral.low { background: rgba(251, 191, 36, 0.1); color: #fde68a; }

        /* 详情弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: #1a1a2e; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 16px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: rgba(255,215,0,0.1); color: #ffd700; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .modal-sentiment { display: inline-block; font-size: 14px; font-weight: 600; padding: 8px 16px; border-radius: 6px; margin-bottom: 16px; }
        .modal-title { font-size: 18px; font-weight: 600; line-height: 1.5; color: #fff; margin-bottom: 12px; }
        .modal-time { font-size: 12px; color: #888; margin-bottom: 20px; }
        .analysis-section { background: #252542; border-radius: 12px; padding: 16px; }
        .analysis-title { font-size: 16px; font-weight: 600; color: #ffd700; margin-bottom: 16px; }
        .analysis-content { font-size: 14px; line-height: 1.8; color: #ccc; white-space: pre-wrap; }

        /* API状态 */
        .api-status { font-size: 11px; color: #666; margin-top: 8px; }
        .api-status.success { color: #4ade80; }
        .api-status.error { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 价格区域 -->
        <div class="price-section">
            <div class="price-header">
                <span class="price-title">实时行情</span>
                <span class="update-time">更新时间: <span id="lastUpdate">--:--:--</span></span>
            </div>
            <div class="price-cards">
                <div class="price-card gold" onclick="location.href='chart.html'">
                    <div class="card-label">伦敦金 XAU/USD <small>📈点击查看走势</small></div>
                    <div class="card-price" id="goldPrice">加载中...</div>
                    <div class="card-change" id="goldChange">--</div>
                </div>
                <div class="price-card silver" onclick="location.href='chart.html'">
                    <div class="card-label">伦敦银 XAG/USD <small>📈点击查看走势</small></div>
                    <div class="card-price" id="silverPrice">加载中...</div>
                    <div class="card-change" id="silverChange">--</div>
                </div>
            </div>
            <div class="api-status" id="apiStatus">数据源: 东方财富</div>
        </div>

        <!-- 快讯区域 -->
        <div class="news-section">
            <div class="section-header">
                <span class="section-title">📰 实时快讯</span>
                <span class="section-tag">东方财富</span>
            </div>
            <div class="news-list" id="newsList"></div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <span></span>
                <span class="close-btn" onclick="closeModal()">← 返回</span>
            </div>
            <div class="modal-sentiment" id="modalSentiment"></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-time" id="modalTime"></div>
            <div class="analysis-section">
                <div class="analysis-title">📈 AI 分析逻辑</div>
                <div class="analysis-content" id="modalAnalysis"></div>
            </div>
        </div>
    </div>

    <script>
        const impactMap = { 'high': '高', 'medium': '中', 'low': '低' };
        
        // 存储上次价格用于计算涨跌
        let lastGoldPrice = null;
        let lastSilverPrice = null;

        function getImpactText(impact) {
            return impactMap[impact] || '低';
        }

        function getSentimentText(sentiment) {
            // 利多=涨=红色，利空=跌=绿色
            const map = { 'bullish': '利多', 'bearish': '利空', 'neutral': '中性' };
            return map[sentiment] || '中性';
        }

        // 东方财富贵金属API
        async function loadRealPrices() {
            try {
                // 使用东方财富贵金属数据
                const response = await fetch('https://hq.sin.cn/ws/hq/v1.php/sym/marketdata/XAUUSD,XAGUSD', {
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('API请求失败');
                
                const data = await response.json();
                
                if (data.data && data.data.list) {
                    const goldData = data.data.list.find(d => d.sym === 'XAUUSD');
                    const silverData = data.data.list.find(d => d.sym === 'XAGUSD');
                    
                    if (goldData) {
                        const price = parseFloat(goldData.last);
                        const change = lastGoldPrice ? price - lastGoldPrice : 0;
                        lastGoldPrice = price;
                        
                        document.getElementById('goldPrice').textContent = price.toFixed(2);
                        document.getElementById('goldChange').textContent = (change >= 0 ? '↑ ' : '↓ ') + Math.abs(change).toFixed(2);
                        document.getElementById('goldChange').className = 'card-change ' + (change >= 0 ? 'up' : 'down');
                    }
                    
                    if (silverData) {
                        const price = parseFloat(silverData.last);
                        const change = lastSilverPrice ? price - lastSilverPrice : 0;
                        lastSilverPrice = price;
                        
                        document.getElementById('silverPrice').textContent = price.toFixed(2);
                        document.getElementById('silverChange').textContent = (change >= 0 ? '↑ ' : '↓ ') + Math.abs(change).toFixed(2);
                        document.getElementById('silverChange').className = 'card-change ' + (change >= 0 ? 'up' : 'down');
                    }
                    
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
                    document.getElementById('apiStatus').textContent = '数据源: 东方财富 √';
                    document.getElementById('apiStatus').className = 'api-status success';
                    return true;
                }
            } catch (e) {
                console.log('东方财富API失败，尝试备用方案', e);
            }
            
            // 备用：尝试新浪API
            try {
                const response = await fetch('https://hq.sin.cn/ws/hq/v1.php/sym/marketdata/XAUUSD,XAGUSD');
                const data = await response.json();
                
                if (data.data && data.data.list) {
                    updatePrices(data.data.list);
                    return true;
                }
            } catch (e) {
                console.log('备用API也失败');
            }
            
            // 如果都失败，使用模拟数据但标注
            document.getElementById('apiStatus').textContent = '数据源: 模拟数据 (API不可用)';
            document.getElementById('apiStatus').className = 'api-status error';
            loadMockPrices();
            return false;
        }

        function updatePrices(list) {
            const goldData = list.find(d => d.sym === 'XAUUSD');
            const silverData = list.find(d => d.sym === 'XAGUSD');
            
            if (goldData) {
                const price = parseFloat(goldData.last);
                const change = lastGoldPrice ? price - lastGoldPrice : 0;
                lastGoldPrice = price;
                
                document.getElementById('goldPrice').textContent = price.toFixed(2);
                document.getElementById('goldChange').textContent = (change >= 0 ? '↑ ' : '↓ ') + Math.abs(change).toFixed(2);
                document.getElementById('goldChange').className = 'card-change ' + (change >= 0 ? 'up' : 'down');
            }
            
            if (silverData) {
                const price = parseFloat(silverData.last);
                const change = lastSilverPrice ? price - lastSilverPrice : 0;
                lastSilverPrice = price;
                
                document.getElementById('silverPrice').textContent = price.toFixed(2);
                document.getElementById('silverChange').textContent = (change >= 0 ? '↑ ' : '↓ ') + Math.abs(change).toFixed(2);
                document.getElementById('silverChange').className = 'card-change ' + (change >= 0 ? 'up' : 'down');
            }
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            document.getElementById('apiStatus').textContent = '数据源: 东方财富 √';
            document.getElementById('apiStatus').className = 'api-status success';
        }

        function loadMockPrices() {
            // 模拟价格（备用）
            const goldPrice = 3015.50 + (Math.random() - 0.5) * 10;
            const silverPrice = 33.25 + (Math.random() - 0.5) * 0.5;
            const goldChange = (Math.random() - 0.5) * 2;
            const silverChange = (Math.random() - 0.5) * 1;

            document.getElementById('goldPrice').textContent = goldPrice.toFixed(2);
            document.getElementById('silverPrice').textContent = silverPrice.toFixed(2);
            document.getElementById('goldChange').textContent = (goldChange >= 0 ? '↑ ' : '↓ ') + Math.abs(goldChange).toFixed(2);
            document.getElementById('silverChange').textContent = (silverChange >= 0 ? '↑ ' : '↓ ') + Math.abs(silverChange).toFixed(2);
            document.getElementById('goldChange').className = 'card-change ' + (goldChange >= 0 ? 'up' : 'down');
            document.getElementById('silverChange').className = 'card-change ' + (silverChange >= 0 ? 'up' : 'down');
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
        }

        function getMockNews() {
            return [
                { id: 1, title: '美联储主席鲍威尔暗示降息预期，金价获得支撑', time: '19:45', sentiment: 'bullish', impact: 'high', source: '东方财富' },
                { id: 2, title: '伦敦金突破3010美元盎司关口，创历史新高', time: '19:30', sentiment: 'bullish', impact: 'high', source: '东方财富' },
                { id: 3, title: '美国CPI数据符合预期，市场观望情绪浓厚', time: '19:15', sentiment: 'neutral', impact: 'low', source: '东方财富' },
                { id: 4, title: '美元指数反弹上涨，黄金承压回落', time: '19:00', sentiment: 'bearish', impact: 'medium', source: '东方财富' },
                { id: 5, title: '全球最大黄金ETF持仓增加，利好金价', time: '18:45', sentiment: 'bullish', impact: 'medium', source: '东方财富' },
                { id: 6, title: '欧洲央行维持利率不变，符合市场预期', time: '18:30', sentiment: 'neutral', impact: 'low', source: '东方财富' },
                { id: 7, title: '地缘政治风险升温，避险资金流入黄金', time: '18:15', sentiment: 'bullish', impact: 'high', source: '东方财富' },
                { id: 8, title: '白银工业需求下降，价格承压', time: '18:00', sentiment: 'bearish', impact: 'medium', source: '东方财富' },
                { id: 9, title: 'COMEX黄金期货持仓量上升，多头力量增强', time: '17:45', sentiment: 'bullish', impact: 'medium', source: '东方财富' },
                { id: 10, title: '美国总统特朗普发表讲话，市场波动加剧', time: '17:30', sentiment: 'neutral', impact: 'high', source: '东方财富' }
            ];
        }

        function analyzeSentiment(text) {
            const bullish = ['上涨', '利好', '突破', '创新高', '涨', '升', '多头', '看涨', '增持', '买入', '支撑', '升温', '增加', '增强'];
            const bearish = ['下跌', '利空', '跌破', '创新低', '跌', '降', '空头', '看跌', '减持', '卖出', '回落', '下降', '承压', '减少'];
            
            let bullishCount = 0, bearishCount = 0;
            bullish.forEach(w => { if (text.includes(w)) bullishCount++ });
            bearish.forEach(w => { if (text.includes(w)) bearishCount++ });
            
            let sentiment = 'neutral', impact = 'low';
            if (bullishCount > bearishCount) {
                sentiment = 'bullish';
                impact = bullishCount >= 3 ? 'high' : (bullishCount >= 2 ? 'medium' : 'low');
            } else if (bearishCount > bullishCount) {
                sentiment = 'bearish';
                impact = bearishCount >= 3 ? 'high' : (bearishCount >= 2 ? 'medium' : 'low');
            }
            return { sentiment, impact };
        }

        function renderNews(newsList) {
            const container = document.getElementById('newsList');
            container.innerHTML = newsList.map(news => `
                <div class="news-item" onclick="openDetail(${JSON.stringify(news).replace(/"/g, '&quot;')})">
                    <div class="news-content">
                        <div class="news-title">${news.title}</div>
                        <div class="news-meta">
                            <span>${news.time}</span>
                            <span>${news.source || '东方财富'}</span>
                        </div>
                    </div>
                    <div class="news-sentiment ${news.sentiment} ${news.impact}">
                        ${getSentimentText(news.sentiment)}(${getImpactText(news.impact)})
                    </div>
                </div>
            `).join('');
        }

        function generateAnalysis(sentiment, impact, time) {
            const impactText = getImpactText(impact);
            let analysis = '';
            
            if (sentiment === 'bullish') {
                analysis = `【利多因素分析】

1. 基本面支撑：该消息表明市场存在积极因素，通常与美元走弱、通胀预期上升或地缘政治风险有关。

2. 技术面影响：短期内可能推动黄金/白银价格进一步上涨，突破关键阻力位。

3. 操作建议：建议关注回调机会，可考虑逢低做多，但需设置止损位。

4. 风险提示：高影响力度消息已反映在当前价格，追高需谨慎。`;
            } else if (sentiment === 'bearish') {
                analysis = `【利空因素分析】

1. 基本面压力：该消息显示市场存在负面因素，可能与美元走强、央行紧缩政策或风险情绪改善有关。

2. 技术面影响：价格可能下探支撑位，若跌破关键位置可能开启新一轮下跌。

3. 操作建议：建议观望为主，若有空单可继续持有，注意保护盈利。

4. 风险提示：注意止损设置，防范价格快速反弹风险。`;
            } else {
                analysis = `【中性因素分析】

1. 市场反应：该消息对市场影响有限，属于常规数据发布或事件。

2. 观望情绪：投资者保持谨慎，等待更多信号指引。

3. 操作建议：维持原有仓位，等待方向明确后再做调整。

4. 后续关注：建议关注后续相关数据发布和市场反应。`;
            }
            
            analysis += `\n\n📊 影响程度：${impactText}\n⏰ 发布时间：${time}\n\n⚠️ 免责声明：以上分析仅供参考，不构成投资建议。投资有风险，入市需谨慎。`;
            return analysis;
        }

        function openDetail(news) {
            document.getElementById('modalSentiment').textContent = getSentimentText(news.sentiment) + '(' + getImpactText(news.impact) + ')';
            document.getElementById('modalSentiment').className = 'modal-sentiment news-sentiment ' + news.sentiment + ' ' + news.impact;
            document.getElementById('modalTitle').textContent = news.title;
            document.getElementById('modalTime').textContent = news.time;
            document.getElementById('modalAnalysis').textContent = generateAnalysis(news.sentiment, news.impact, news.time);
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 初始化
        const newsList = getMockNews();
        const analyzedNews = newsList.map(news => {
            const { sentiment, impact } = analyzeSentiment(news.title);
            return { ...news, sentiment: news.sentiment || sentiment, impact: news.impact || impact };
        });
        
        loadRealPrices();
        renderNews(analyzedNews);

        // 每30秒更新
        setInterval(() => {
            loadRealPrices();
        }, 30000);
    </script>
</body>
</html>
