<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>炒金宝 - 伦敦金伦敦银实时行情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .price-section { padding: 20px; background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%); border-radius: 16px; margin-bottom: 16px; }
        .price-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .price-title { font-size: 18px; font-weight: 600; color: #ffd700; }
        .update-time { font-size: 12px; color: #888; }
        .price-cards { display: flex; gap: 12px; }
        .price-card { flex: 1; background: linear-gradient(135deg, #2d2d4a 0%, #1f1f3a 100%); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .price-card:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2); }
        .price-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .price-card.gold::before { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .price-card.silver::before { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .card-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .card-price { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .card-change { font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .card-change.up { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
        .card-change.down { color: #f87171; background: rgba(248, 113, 113, 0.15); }
        .news-section { padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 18px; font-weight: 600; color: #fff; }
        .section-tag { font-size: 11px; color: #666; background: #2d2d4a; padding: 4px 10px; border-radius: 10px; }
        .news-list { display: flex; flex-direction: column; gap: 10px; }
        .news-item { background: #252542; border-radius: 12px; padding: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
        .news-item:active { background: #2d2d4a; transform: scale(0.98); }
        .news-content { flex: 1; margin-right: 12px; }
        .news-title { font-size: 14px; color: #fff; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { display: flex; gap: 10px; font-size: 11px; color: #888; }
        .news-sentiment { font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
        .news-sentiment.bullish.high { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.4); }
        .news-sentiment.bullish.medium { background: rgba(248, 113, 113, 0.15); color: #fca5a5; }
        .news-sentiment.bullish.low { background: rgba(248, 113, 113, 0.1); color: #fecaca; }
        .news-sentiment.bearish.high { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.4); }
        .news-sentiment.bearish.medium { background: rgba(74, 222, 128, 0.15); color: #86efac; }
        .news-sentiment.bearish.low { background: rgba(74, 222, 128, 0.1); color: #bbf7d0; }
        .news-sentiment.neutral.high { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.4); }
        .news-sentiment.neutral.medium { background: rgba(251, 191, 36, 0.15); color: #fcd34d; }
        .news-sentiment.neutral.low { background: rgba(251, 191, 36, 0.1); color: #fde68a; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: #1a1a2e; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 16px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: rgba(255,215,0,0.1); color: #ffd700; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .modal-sentiment { display: inline-block; font-size: 14px; font-weight: 600; padding: 8px 16px; border-radius: 6px; margin-bottom: 16px; }
        .modal-title { font-size: 18px; font-weight: 600; line-height: 1.5; color: #fff; margin-bottom: 12px; }
        .modal-desc { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 16px; }
        .modal-time { font-size: 12px; color: #888; margin-bottom: 20px; }
        .analysis-section { background: #252542; border-radius: 12px; padding: 16px; }
        .analysis-title { font-size: 16px; font-weight: 600; color: #ffd700; margin-bottom: 16px; }
        .analysis-content { font-size: 14px; line-height: 1.8; color: #ccc; white-space: pre-wrap; }
        .api-status { font-size: 11px; color: #4ade80; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="price-section">
            <div class="price-header">
                <span class="price-title">实时行情</span>
                <span class="update-time">更新时间: <span id="lastUpdate">--:--:--</span></span>
            </div>
            <div class="price-cards">
                <div class="price-card gold" onclick="location.href='chart.html?symbol=XAUUSD'">
                    <div class="card-label">伦敦金 XAU/USD</div>
                    <div class="card-price" id="goldPrice">加载中...</div>
                    <div class="card-change" id="goldChange">--</div>
                </div>
                <div class="price-card silver" onclick="location.href='chart.html?symbol=XAGUSD'">
                    <div class="card-label">伦敦银 XAG/USD</div>
                    <div class="card-price" id="silverPrice">加载中...</div>
                    <div class="card-change" id="silverChange">--</div>
                </div>
            </div>
            <div class="api-status" id="apiStatus">数据源加载中...</div>
        </div>

        <div class="news-section">
            <div class="section-header">
                <span class="section-title">📰 实时快讯</span>
                <span class="section-tag">华尔街见闻</span>
            </div>
            <div class="news-list" id="newsList">
                <div style="text-align:center;padding:20px;color:#888;">加载中...</div>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <span></span>
                <span class="close-btn" onclick="closeModal()">← 返回</span>
            </div>
            <div class="modal-sentiment" id="modalSentiment"></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <div class="modal-time" id="modalTime"></div>
            <div class="analysis-section">
                <div class="analysis-title">📈 AI 分析：对金价影响</div>
                <div class="analysis-content" id="modalAnalysis"></div>
            </div>
        </div>
    </div>

    <script>
        const GOLD_API_KEY = 'goldapi-a3oklx19mn5imvsw-io';
        const impactMap = { 'high': '高', 'medium': '中', 'low': '低' };
        let cachedNews = [];

        function getImpactText(impact) { return impactMap[impact] || '低'; }
        function getSentimentText(sentiment) { return { 'bullish': '利多', 'bearish': '利空', 'neutral': '中性' }[sentiment] || '中性'; }

        // 黄金价格 API
        async function loadGoldPrice() {
            try {
                const response = await fetch('https://www.goldapi.io/api/XAU/USD', {
                    headers: { 'x-access-token': GOLD_API_KEY, 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.price) {
                        return { price: data.price, change: data.chg || 0 };
                    }
                }
            } catch (e) { console.log('GoldAPI失败', e); }
            return null;
        }

        // 白银价格 API
        async function loadSilverPrice() {
            try {
                const response = await fetch('https://www.goldapi.io/api/XAG/USD', {
                    headers: { 'x-access-token': GOLD_API_KEY, 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.price) {
                        return { price: data.price, change: data.chg || 0 };
                    }
                }
            } catch (e) { console.log('Silver API失败', e); }
            return null;
        }

        // 加载所有价格
        async function loadPrices() {
            const goldData = await loadGoldPrice();
            const silverData = await loadSilverPrice();
            
            if (goldData) {
                document.getElementById('goldPrice').textContent = goldData.price.toFixed(2);
                document.getElementById('goldChange').textContent = (goldData.change >= 0 ? '↑ ' : '↓ ') + Math.abs(goldData.change).toFixed(2);
                document.getElementById('goldChange').className = 'card-change ' + (goldData.change >= 0 ? 'up' : 'down');
            }
            
            if (silverData) {
                document.getElementById('silverPrice').textContent = silverData.price.toFixed(2);
                document.getElementById('silverChange').textContent = (silverData.change >= 0 ? '↑ ' : '↓ ') + Math.abs(silverData.change).toFixed(2);
                document.getElementById('silverChange').className = 'card-change ' + (silverData.change >= 0 ? 'up' : 'down');
            }
            
            if (goldData || silverData) {
                document.getElementById('apiStatus').textContent = '数据源: GoldAPI.io √';
                document.getElementById('apiStatus').style.color = '#4ade80';
            } else {
                document.getElementById('apiStatus').textContent = '数据源: API异常';
                document.getElementById('apiStatus').style.color = '#f87171';
            }
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
        }

        // 实时快讯 - 尝试多个新闻源
        async function loadNews() {
            let newsData = [];
            
            // 方法1: 尝试华尔街见闻RSS
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.wallstreetcn.com/rss/feed');
                const data = await response.json();
                if (data.status === 'ok' && data.items) {
                    newsData = data.items.slice(0, 15).map(item => ({
                        id: item.guid || item.link,
                        title: item.title,
                        desc: item.description?.replace(/<[^>]+>/g, '').substring(0, 200) || '',
                        time: new Date(item.pubDate).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                        link: item.link,
                        source: '华尔街见闻'
                    }));
                }
            } catch (e) {
                console.log('华尔街见闻API失败', e);
            }
            
            // 方法2: 尝试新浪财经
            if (newsData.length === 0) {
                try {
                    const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://finance.sina.com.cn/roll/rollnews.xml');
                    const data = await response.json();
                    if (data.status === 'ok' && data.items) {
                        newsData = data.items.slice(0, 15).map(item => ({
                            id: item.guid || item.link,
                            title: item.title,
                            desc: '',
                            time: new Date(item.pubDate).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                            link: item.link,
                            source: '新浪财经'
                        }));
                    }
                } catch (e) {
                    console.log('新浪RSS失败', e);
                }
            }
            
            // 方法3: 尝试BBC商业新闻
            if (newsData.length === 0) {
                try {
                    const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/business/rss.xml');
                    const data = await response.json();
                    if (data.status === 'ok' && data.items) {
                        newsData = data.items.slice(0, 15).map(item => ({
                            id: item.guid || item.link,
                            title: item.title,
                            desc: item.description?.replace(/<[^>]+>/g, '').substring(0, 200) || '',
                            time: new Date(item.pubDate).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                            link: item.link,
                            source: 'BBC Business'
                        }));
                    }
                } catch (e) {
                    console.log('BBC RSS失败', e);
                }
            }
            
            if (newsData.length > 0) {
                cachedNews = newsData;
                renderNews(newsData);
            } else {
                document.getElementById('newsList').innerHTML = '<div style="text-align:center;padding:20px;color:#888;">暂无快讯</div>';
            }
        }

        function analyzeSentiment(text) {
            const bullish = ['上涨', '利好', '突破', '创新高', '涨', '升', '多头', '看涨', '增持', '买入', '支撑', '升温', '增加', '增强', '反弹', '新高', '走强', '攀升'];
            const bearish = ['下跌', '利空', '跌破', '创新低', '跌', '降', '空头', '看跌', '减持', '卖出', '回落', '下降', '承压', '下行', '新低', '走弱', '跳水'];
            
            let bullishCount = 0, bearishCount = 0;
            bullish.forEach(w => { if (text.includes(w)) bullishCount++ });
            bearish.forEach(w => { if (text.includes(w)) bearishCount++ });
            
            let sentiment = 'neutral', impact = 'low';
            if (bullishCount > bearishCount) {
                sentiment = 'bullish';
                impact = bullishCount >= 3 ? 'high' : (bullishCount >= 2 ? 'medium' : 'low');
            } else if (bearishCount > bullishCount) {
                sentiment = 'bearish';
                impact = bearishCount >= 3 ? 'high' : (bearishCount >= 2 ? 'medium' : 'low');
            }
            return { sentiment, impact };
        }

        function renderNews(newsList) {
            const container = document.getElementById('newsList');
            container.innerHTML = newsList.map(news => {
                const analysis = analyzeSentiment(news.title);
                return `
                    <div class="news-item" onclick="openDetail(${JSON.stringify({...news, ...analysis}).replace(/"/g, '&quot;')})">
                        <div class="news-content">
                            <div class="news-title">${news.title}</div>
                            <div class="news-meta">
                                <span>${news.time}</span>
                                <span>${news.source}</span>
                            </div>
                        </div>
                        <div class="news-sentiment ${analysis.sentiment} ${analysis.impact}">
                            ${getSentimentText(analysis.sentiment)}(${getImpactText(analysis.impact)})
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateAnalysis(sentiment, impact, title, desc) {
            const impactText = getImpactText(impact);
            
            let analysis = '';
            
            if (sentiment === 'bullish') {
                analysis = `【对金价影响分析 - 利多】

该消息对黄金市场构成利好，原因分析：

1. 市场情绪：${title.includes('美元') ? '美元走弱通常利好黄金' : '消息提振市场风险偏好，利好贵金属'}

2. 供需因素：${title.includes('ETF') ? 'ETF持仓增加表明机构投资者看多黄金' : '市场资金可能流入贵金属避险板块'}

3. 技术面：短期内可能推动金价上涨，关注上方阻力位。

4. 操作建议：可关注回调机会逢低布局，但需设置止损。

⚠️ 风险提示：以上仅供参考，投资需谨慎。`;
            } else if (sentiment === 'bearish') {
                analysis = `【对金价影响分析 - 利空】

该消息对黄金市场构成利空，原因分析：

1. 市场情绪：${title.includes('美元') ? '美元走强通常利空黄金' : '风险情绪改善可能削弱黄金避险需求'}

2. 资金流向：${title.includes('ETF') ? 'ETF持仓下降表明资金流出' : '投资者可能从贵金属转向风险资产'}

3. 技术面：价格可能下探支撑位。

4. 操作建议：建议观望或关注反弹阻力位做空。

⚠️ 风险提示：以上仅供参考，投资需谨慎。`;
            } else {
                analysis = `【对金价影响分析 - 中性】

该消息对黄金市场影响有限，原因分析：

1. 市场反应：消息已被市场充分消化，未产生明显波动。

2. 观望情绪：投资者保持谨慎，等待更多信号。

3. 后续关注：建议关注相关经济数据发布。

⚠️ 风险提示：以上仅供参考，投资需谨慎。`;
            }
            
            return analysis;
        }

        function openDetail(news) {
            document.getElementById('modalSentiment').textContent = getSentimentText(news.sentiment) + '(' + getImpactText(news.impact) + ')';
            document.getElementById('modalSentiment').className = 'modal-sentiment news-sentiment ' + news.sentiment + ' ' + news.impact;
            document.getElementById('modalTitle').textContent = news.title;
            document.getElementById('modalDesc').textContent = news.desc || '暂无详细描述';
            document.getElementById('modalTime').textContent = news.time + ' · ' + news.source;
            document.getElementById('modalAnalysis').textContent = generateAnalysis(news.sentiment, news.impact, news.title, news.desc);
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 初始化
        loadPrices();
        loadNews();

        // 每10分钟更新 (600000ms)
        setInterval(loadPrices, 600000);
        setInterval(loadNews, 600000);
    </script>
</body>
</html>
