<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>炒金宝 - 伦敦金伦敦银实时行情</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:16px}
.price-section{padding:20px;background:linear-gradient(180deg,#16213e,#1a1a2e);border-radius:16px;margin-bottom:16px;position:sticky;top:0;z-index:100}
.price-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.price-title{font-size:18px;font-weight:600;color:#ffd700}
.update-time{font-size:12px;color:#888}
.price-cards{display:flex;gap:12px}
.price-card{flex:1;background:linear-gradient(135deg,#2d2d4a,#1f1f3a);border-radius:12px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.price-card:hover{transform:scale(1.02)}
.price-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.price-card.gold::before{background:linear-gradient(90deg,#ffd700,#ffaa00)}
.price-card.silver::before{background:linear-gradient(90deg,#c0c0c0,#a0a0a0)}
.card-label{font-size:12px;color:#aaa;margin-bottom:8px}
.card-price{font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
.card-change{font-size:13px;font-weight:600;padding:4px 10px;border-radius:6px;display:inline-block}
.card-change.up{color:#f87171;background:rgba(248,113,113,0.2)}
.card-change.down{color:#4ade80;background:rgba(74,222,128,0.2)}
.news-tabs{display:flex;gap:8px;margin-bottom:16px}
.news-tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;border:2px solid transparent}
.news-tab.trump{background:linear-gradient(135deg,#1e3a5f,#2d4a6f);color:#fff}
.news-tab.trump.active{border-color:#ffd700;background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.news-tab.fed{background:linear-gradient(135deg,#3b2f5f,#4a3f6f);color:#fff}
.news-tab.fed.active{border-color:#ffd700;background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.news-tab.geo{background:linear-gradient(135deg,#3f2f2f,#4f3f3f);color:#fff}
.news-tab.geo.active{border-color:#ffd700;background:linear-gradient(135deg,#dc2626,#b91c1c)}
.news-section{padding:20px 0}
.section-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:16px}
.news-list{display:flex;flex-direction:column;gap:10px}
.news-item{background:#252542;border-radius:12px;padding:14px;cursor:pointer}
.news-content{display:flex;justify-content:space-between;align-items:flex-start}
.news-titles{flex:1;margin-right:12px}
.news-title-zh{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:6px}
.news-title-en{font-size:12px;color:#888;line-height:1.4}
.news-meta{font-size:11px;color:#666;margin-top:6px}
.news-title-zh.bullish{color:#f87171}
.news-title-zh.bearish{color:#4ade80}
.news-title-zh.neutral{color:#fbbf24}
.news-sentiment{font-size:11px;font-weight:600;padding:4px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.news-sentiment.bullish{background:rgba(248,113,113,0.2);color:#f87171}
.news-sentiment.bearish{background:rgba(74,222,128,0.2);color:#4ade80}
.news-sentiment.neutral{background:rgba(251,191,36,0.2);color:#fbbf24}
.api-status{font-size:11px;color:#4ade80;margin-top:8px;text-align:center}
.news-count{text-align:center;font-size:12px;color:#666;padding:10px}
</style>
</head>
<body>
<div class="container">
<div class="price-section">
<div class="price-header">
<span class="price-title">实时行情</span>
<span class="update-time">更新时间: <span id="lastUpdate">--:--:--</span></span>
</div>
<div class="price-cards">
<div class="price-card gold" onclick="location.href='chart.html?symbol=XAUUSD'">
<div class="card-label">伦敦金 XAU/USD</div>
<div class="card-price" id="goldPrice">--</div>
<div class="card-change" id="goldChange">--</div>
</div>
<div class="price-card silver" onclick="location.href='chart.html?symbol=XAGUSD'">
<div class="card-label">伦敦银 XAG/USD</div>
<div class="card-price" id="silverPrice">--</div>
<div class="card-change" id="silverChange">--</div>
</div>
</div>
<div class="api-status" id="apiStatus">数据源加载中...</div>
</div>

<div class="news-tabs">
<div class="news-tab trump active" id="tabTrump" onclick="switchTab('trump')">🇺🇸 川普动态</div>
<div class="news-tab fed" id="tabFed" onclick="switchTab('fed')">💵 美联储</div>
<div class="news-tab geo" id="tabGeo" onclick="switchTab('geopolitics')">🌍 地缘局势</div>
</div>

<div class="news-section">
<div class="section-title">📰 实时快讯</div>
<div class="news-list" id="newsList"></div>
<div class="news-count" id="newsCount">加载中...</div>
</div>
</div>

<script>
var GOLD_KEY = 'goldapi-a3oklx19mn5imvsw-io';
var allNews = { trump: [], fed: [], geopolitics: [] };
var shownCount = 0;
var curTab = 'trump';

function getSentiment(imp) { return {high:'高',medium:'中',low:'低'}[imp] || '低'; }
function getDir(s) { return {bullish:'利多',bearish:'利空',neutral:'中性'}[s] || '中性'; }

async function loadPrices() {
    try {
        var r1 = await fetch('https://www.goldapi.io/api/XAU/USD',{headers:{'x-access-token':GOLD_KEY}});
        var r2 = await fetch('https://www.goldapi.io/api/XAG/USD',{headers:{'x-access-token':GOLD_KEY}});
        var g = await r1.json();
        var s = await r2.json();
        
        // 黄金 - 计算涨跌幅
        if (g.price) {
            var price = g.price;
            var open = g.open_price || g.open || g.open_24h || g.prev_close_price || price;
            var chg = price - open;
            var pct = open > 0 ? ((chg / open) * 100) : 0;
            
            document.getElementById('goldPrice').textContent = price.toFixed(2);
            
            var isUp = chg >= 0;
            var arrow = isUp ? '↑ ' : '↓ ';
            var pctSign = isUp ? '+' : '';
            document.getElementById('goldChange').textContent = arrow + Math.abs(chg).toFixed(2) + ' (' + pctSign + pct.toFixed(2) + '%)';
            document.getElementById('goldChange').className = 'card-change ' + (isUp ? 'up' : 'down');
        }
        
        // 白银 - 计算涨跌幅
        if (s.price) {
            var price2 = s.price;
            var open2 = s.open_price || s.open || s.open_24h || s.prev_close_price || price2;
            var chg2 = price2 - open2;
            var pct2 = open2 > 0 ? ((chg2 / open2) * 100) : 0;
            
            document.getElementById('silverPrice').textContent = price2.toFixed(2);
            
            var isUp2 = chg2 >= 0;
            var arrow2 = isUp2 ? '↑ ' : '↓ ';
            var pctSign2 = isUp2 ? '+' : '';
            document.getElementById('silverChange').textContent = arrow2 + Math.abs(chg2).toFixed(2) + ' (' + pctSign2 + pct2.toFixed(2) + '%)';
            document.getElementById('silverChange').className = 'card-change ' + (isUp2 ? 'up' : 'down');
        }
        
        document.getElementById('apiStatus').textContent = 'GoldAPI.io √';
    } catch(e) {
        document.getElementById('apiStatus').textContent = 'API异常';
        console.error(e);
    }
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
}

// 翻译缓存
var transCache = {};

// 异步翻译函数 - 使用MyMemory免费API
async function translate(text) {
    if (!text || text.length === 0) return text;
    
    // 检查缓存
    if (transCache[text]) return transCache[text];
    
    try {
        var encoded = encodeURIComponent(text);
        var url = 'https://api.mymemory.translated.net/get?q=' + encoded + '&langpair=en|zh';
        var resp = await fetch(url);
        var data = await resp.json();
        
        if (data && data.responseData && data.responseData.translatedText) {
            var result = data.responseData.translatedText;
            transCache[text] = result;
            return result;
        }
    } catch(e) {
        console.log('Translation error, using fallback');
    }
    
    // 备用本地翻译
    return localTranslate(text);
}

// 本地翻译（离线备用）
function localTranslate(text) {
    var map = {
        'President Trump':'特朗普总统','Donald Trump':'特朗普','Trump':'特朗普',
        'tariff':'关税','tariffs':'关税','imposed':'征收','impose':'征收','trade war':'贸易战',
        'White House':'白宫','President':'总统','announcement':'公告','announce':'宣布',
        'Federal Reserve':'美联储','Fed':'美联储','FOMC':'美联储公开市场委员会',
        'interest rate':'利率','rate hike':'加息','rate cut':'降息',
        'policy':'政策','statement':'声明','press conference':'新闻发布会',
        'Russia':'俄罗斯','Russian':'俄罗斯','Ukraine':'乌克兰',
        'war':'战争','conflict':'冲突','Middle East':'中东',
        'Israel':'以色列','Iran':'伊朗','tension':'紧张','crisis':'危机',
        'peace':'和平','ceasefire':'停火','agreement':'协议','deal':'协议',
        'Gold':'黄金','gold':'黄金','silver':'白银','ounces':'盎司',
        'price':'价格','prices':'价格','rises':'上涨','falls':'下跌','surges':'飙升','drops':'下跌',
        'high':'高位','low':'低位','record':'纪录','all-time high':'历史新高',
        'dollar':'美元','US dollar':'美元','USD':'美元','DXY':'美元指数',
        'inflation':'通胀','economy':'经济','economic':'经济的','GDP':'GDP',
        'sanction':'制裁','sanctions':'制裁','military':'军事','troops':'军队',
        'attack':'攻击','strikes':'打击','market':'市场','investors':'投资者',
        'safe haven':'避险','uncertainty':'不确定性','recession':'衰退',
        'impose':'征收','retaliatory':'报复性','additional':'额外',
        'surge':'飙升','climb':'攀升','jump':'跳涨','soar':'暴涨',
        'plunge':'暴跌','tumble':'大跌','slump':'下挫','retreat':'回落'
    };
    var keys = Object.keys(map).sort(function(a,b){return b.length-a.length});
    for (var i=0;i<keys.length;i++) {
        text = text.replace(new RegExp('\\b'+keys[i]+'\\b','gi'),map[keys[i]]);
    }
    return text.replace(/\s+/g,' ').trim();
}

function shouldInclude(t) {
    var ex = ['forecast','prediction','price target','rating','analyst','upgrade','downgrade','outlook','estimate'];
    for (var i=0;i<ex.length;i++) { if (t.toLowerCase().indexOf(ex[i]) > -1) return false; }
    return true;
}

function analyze(text) {
    var t = text.toLowerCase();
    var bullish = ['rises','surge','gains','announce','impose','tariff','war','tension','crisis','risk','上涨','飙升','关税','战争','危机'];
    var bearish = ['falls','drops','deal','peace','agreement','ceasefire','下跌','协议','停火'];
    var bc=0, rc=0;
    for (var i=0;i<bullish.length;i++) { if (t.indexOf(bullish[i]) > -1) bc++; }
    for (var i=0;i<bearish.length;i++) { if (t.indexOf(bearish[i]) > -1) rc++; }
    if (bc > rc) return {s:'bullish',imp:bc>=2?'high':'medium'};
    if (rc > bc) return {s:'bearish',imp:rc>=2?'high':'medium'};
    return {s:'neutral',imp:'low'};
}

var sources = {
    trump: 'https://news.google.com/rss/search?q=Trump+tariff+trade+war+White+House+announcement&hl=en-US&gl=US&ceid=US:en',
    fed: 'https://news.google.com/rss/search?q=Fed+interest+rate+Federal+Reserve+policy+statement&hl=en-US&gl=US&ceid=US:en',
    geopolitics: 'https://news.google.com/rss/search?q=Russia+Ukraine+war+Middle+East+tension+geopolitical+crisis&hl=en-US&gl=US&ceid=US:en'
};

async function loadNews(src) {
    try {
        var r = await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(sources[src]));
        var d = await r.json();
        if (d.status=='ok' && d.items) {
            var arr = d.items.filter(function(it){ return shouldInclude(it.title||''); });
            for (var i=0;i<arr.length;i++) {
                var it = arr[i];
                it.title_zh = await translate(it.title);  // 等待翻译完成
                var a = analyze(it.title);
                it.sentiment = a.s;
                it.impact = a.imp;
                it.time = new Date(it.pubDate).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
                it.pubDate = new Date(it.pubDate).getTime();
            }
            arr.sort(function(a,b){return b.pubDate-a.pubDate;});
            allNews[src] = arr;
            if (src == curTab) { shownCount = 0; renderNews(); }
        }
    } catch(e) { console.log('load error'); }
}

function switchTab(tab) {
    curTab = tab;
    document.getElementById('tabTrump').className = 'news-tab trump'+(tab=='trump'?' active':'');
    document.getElementById('tabFed').className = 'news-tab fed'+(tab=='fed'?' active':'');
    document.getElementById('tabGeo').className = 'news-tab geo'+(tab=='geopolitics'?' active':'');
    shownCount = 0;
    renderNews();
}

function renderNews() {
    var c = document.getElementById('newsList');
    var batch = allNews[curTab].slice(shownCount, shownCount+30);
    if (shownCount==0) c.innerHTML='';
    for (var i=0;i<batch.length;i++) {
        var n = batch[i];
        var html = '<div class="news-item" onclick="goDetail(\''+encodeURIComponent(n.title)+'\',\''+encodeURIComponent(n.title_zh)+'\',\''+n.sentiment+'\',\''+n.impact+'\',\''+n.time+'\',\''+encodeURIComponent(n.link)+'\')">';
        html += '<div class="news-content"><div class="news-titles">';
        html += '<div class="news-title-zh '+n.sentiment+'">'+n.title_zh+'</div>';
        html += '<div class="news-title-en">原文：'+n.title+'</div>';
        html += '<div class="news-meta">'+n.time+' · '+(curTab=='trump'?'川普动态':curTab=='fed'?'美联储':'地缘局势')+'</div>';
        html += '</div><div class="news-sentiment '+n.sentiment+'">'+getDir(n.sentiment)+'('+getSentiment(n.impact)+')</div></div></div>';
        c.innerHTML += html;
    }
    shownCount += batch.length;
    document.getElementById('newsCount').textContent = '已加载 '+shownCount+' 条';
}

function goDetail(en,zh,s,imp,tm,link) {
    var url = 'detail.html?title_en='+encodeURIComponent(en)+'&title_zh='+encodeURIComponent(zh)+'&sentiment='+s+'&impact='+imp+'&time='+encodeURIComponent(tm)+'&link='+encodeURIComponent(link);
    location.href = url;
}

window.onscroll = function() {
    if ((window.innerHeight+window.scrollY) >= document.body.offsetHeight-100) {
        if (shownCount < allNews[curTab].length) renderNews();
    }
};

loadPrices();
loadNews('trump');
loadNews('fed');
loadNews('geopolitics');
setInterval(loadPrices,600000);
</script>
</body>
</html>
