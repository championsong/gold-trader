<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>炒金宝 - 伦敦金伦敦银实时行情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        
        .price-section { padding: 20px; background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%); border-radius: 16px; margin-bottom: 16px; position: sticky; top: 0; z-index: 100; }
        .price-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .price-title { font-size: 18px; font-weight: 600; color: #ffd700; }
        .update-time { font-size: 12px; color: #888; }
        .price-cards { display: flex; gap: 12px; }
        .price-card { flex: 1; background: linear-gradient(135deg, #2d2d4a 0%, #1f1f3a 100%); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .price-card:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2); }
        .price-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .price-card.gold::before { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .price-card.silver::before { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .card-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .card-price { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .card-change { font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .card-change.up { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
        .card-change.down { color: #f87171; background: rgba(248, 113, 113, 0.15); }
        
        .news-tabs { display: flex; gap: 8px; margin-bottom: 16px; background: #252542; border-radius: 12px; padding: 4px; }
        .news-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .news-tab.active { background: #ffd700; color: #1a1a2e; }
        .news-tab:not(.active) { color: #888; }
        
        .news-section { padding: 20px; padding-bottom: 40px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position: sticky; top: 180px; z-index: 99; background: #1a1a2e; padding: 12px 0; }
        .section-title { font-size: 18px; font-weight: 600; color: #fff; }
        .section-tag { font-size: 11px; color: #666; background: #2d2d4a; padding: 4px 10px; border-radius: 10px; }
        
        .news-list { display: flex; flex-direction: column; gap: 10px; }
        .news-item { background: #252542; border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s; }
        .news-item:active { background: #2d2d4a; transform: scale(0.99); }
        .news-content { display: flex; justify-content: space-between; align-items: flex-start; }
        .news-titles { flex: 1; margin-right: 12px; }
        .news-title-zh { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 6px; }
        .news-title-en { font-size: 12px; color: #888; line-height: 1.4; }
        .news-meta { font-size: 11px; color: #666; margin-top: 6px; }
        
        .news-title-zh.bullish { color: #f87171; }
        .news-title-zh.bearish { color: #4ade80; }
        .news-title-zh.neutral { color: #fbbf24; }
        
        .news-sentiment { font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
        .news-sentiment.bullish { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .news-sentiment.bearish { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .news-sentiment.neutral { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        
        .api-status { font-size: 11px; color: #4ade80; margin-top: 8px; text-align: center; }
        .loading { text-align: center; padding: 20px; color: #888; font-size: 14px; }
        .news-count { text-align: center; font-size: 12px; color: #666; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="price-section">
            <div class="price-header">
                <span class="price-title">实时行情</span>
                <span class="update-time">更新时间: <span id="lastUpdate">--:--:--</span></span>
            </div>
            <div class="price-cards">
                <div class="price-card gold" onclick="location.href='chart.html?symbol=XAUUSD'">
                    <div class="card-label">伦敦金 XAU/USD</div>
                    <div class="card-price" id="goldPrice">加载中...</div>
                    <div class="card-change" id="goldChange">--</div>
                </div>
                <div class="price-card silver" onclick="location.href='chart.html?symbol=XAGUSD'">
                    <div class="card-label">伦敦银 XAG/USD</div>
                    <div class="card-price" id="silverPrice">加载中...</div>
                    <div class="card-change" id="silverChange">--</div>
                </div>
            </div>
            <div class="api-status" id="apiStatus">数据源加载中...</div>
        </div>

        <div class="news-tabs">
            <div class="news-tab active" onclick="switchTab('gold')">💰 黄金快讯</div>
            <div class="news-tab" onclick="switchTab('trump')">🇺🇸 川普动态</div>
        </div>

        <div class="news-section">
            <div class="section-header">
                <span class="section-title">📰 实时快讯</span>
                <span class="section-tag" id="currentSource">Google News</span>
            </div>
            <div class="news-list" id="newsList">
                <div class="loading" id="loading">加载中...</div>
            </div>
            <div class="news-count" id="newsCount">已加载 0 条新闻</div>
        </div>
    </div>

    <script>
        const GOLD_API_KEY = 'goldapi-a3oklx19mn5imvsw-io';
        const impactMap = { 'high': '高', 'medium': '中', 'low': '低' };
        let allNews = { gold: [], trump: [] };
        let displayedCount = 0;
        let currentTab = 'gold';
        const BATCH_SIZE = 30;
        
        function getImpactText(impact) { return impactMap[impact] || '低'; }
        function getSentimentText(sentiment) { return { 'bullish': '利多', 'bearish': '利空', 'neutral': '中性' }[sentiment] || '中性'; }

        async function loadPrices() {
            try {
                const [goldRes, silverRes] = await Promise.all([
                    fetch('https://www.goldapi.io/api/XAU/USD', { headers: { 'x-access-token': GOLD_API_KEY } }),
                    fetch('https://www.goldapi.io/api/XAG/USD', { headers: { 'x-access-token': GOLD_API_KEY } })
                ]);
                const goldData = await goldRes.json();
                const silverData = await silverRes.json();
                
                if (goldData.price) {
                    document.getElementById('goldPrice').textContent = goldData.price.toFixed(2);
                    document.getElementById('goldChange').textContent = (goldData.chg >= 0 ? '↑ ' : '↓ ') + Math.abs(goldData.chg || 0).toFixed(2);
                    document.getElementById('goldChange').className = 'card-change ' + ((goldData.chg || 0) >= 0 ? 'up' : 'down');
                }
                if (silverData.price) {
                    document.getElementById('silverPrice').textContent = silverData.price.toFixed(2);
                    document.getElementById('silverChange').textContent = (silverData.chg >= 0 ? '↑ ' : '↓ ') + Math.abs(silverData.chg || 0).toFixed(2);
                    document.getElementById('silverChange').className = 'card-change ' + ((silverData.chg || 0) >= 0 ? 'up' : 'down');
                }
                document.getElementById('apiStatus').textContent = '数据源: GoldAPI.io √';
                document.getElementById('apiStatus').style.color = '#4ade80';
            } catch (e) {
                document.getElementById('apiStatus').textContent = '数据源: API异常';
                document.getElementById('apiStatus').style.color = '#f87171';
            }
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
        }

        function translateTitle(title) {
            const translations = {
                'Gold price today': '今日黄金价格', 'gold prices': '黄金价格', 'Gold rises': '黄金上涨',
                'Gold falls': '黄金下跌', 'Gold surges': '黄金价格飙升', 'Gold drops': '黄金价格下跌',
                'gold market': '黄金市场', 'Gold futures': '黄金期货', 'Dollar': '美元', 'US Dollar': '美元',
                'Federal Reserve': '美联储', 'Fed': '美联储', 'interest rate': '利率', 'inflation': '通胀',
                'tariff': '关税', 'trade': '贸易', 'China': '中国', 'market': '市场', 'rises': '上涨',
                'falls': '下跌', 'surge': '飙升', 'drop': '下跌', 'Trump': '特朗普', 'Trump says': '特朗普表示',
                'tariff': '关税', 'tariffs': '关税', 'trade war': '贸易战', 'impose': '征收', 'announces': '宣布',
                'White House': '白宫', 'President': '总统', 'executive order': '行政令'
            };
            let zh = title;
            Object.keys(translations).sort((a, b) => b.length - a.length).forEach(phrase => {
                zh = zh.replace(new RegExp(phrase, 'gi'), translations[phrase]);
            });
            return zh;
        }

        async function loadNews(source) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('currentSource').textContent = source === 'gold' ? '黄金快讯' : '川普动态';
            
            const rssUrl = source === 'gold' 
                ? 'https://news.google.com/rss/search?q=gold%20price%20OR%20XAUUSD%20OR%20forex%20market&hl=en-US&gl=US&ceid=US:en'
                : 'https://news.google.com/rss/search?q=Trump%20OR%20tariff%20OR%20trade%20war%20OR%20White%20House&hl=en-US&gl=US&ceid=US:en';
            
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl));
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    allNews[source] = data.items.map((item, index) => {
                        const title = item.title || '';
                        const analysis = analyzeSentiment(title);
                        return {
                            id: index, title_en: title, title_zh: translateTitle(title),
                            time: new Date(item.pubDate).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                            link: item.link, pubDate: new Date(item.pubDate).getTime(),
                            sentiment: analysis.sentiment, impact: analysis.impact
                        };
                    });
                    allNews[source].sort((a, b) => b.pubDate - a.pubDate);
                    
                    if (source === currentTab) {
                        displayedCount = 0;
                        renderBatch();
                    }
                }
            } catch (e) {
                console.log('News load failed', e);
            }
            
            document.getElementById('loading').classList.add('hidden');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.news-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab)));
            displayedCount = 0;
            renderBatch();
        }

        function analyzeSentiment(text) {
            const bullish = ['rises', 'Rises', 'surge', 'gains', 'bullish', 'high', 'up', 'soars', 'rally', '上涨', '攀升', '飙升'];
            const bearish = ['falls', 'Falls', 'drops', 'drop', 'bearish', 'low', 'down', 'plunges', 'slump', '下跌', '下行', '跳水'];
            let bullishCount = 0, bearishCount = 0;
            const lowerText = text.toLowerCase();
            bullish.forEach(w => { if (lowerText.includes(w.toLowerCase())) bullishCount++ });
            bearish.forEach(w => { if (lowerText.includes(w.toLowerCase())) bearishCount++ });
            let sentiment = 'neutral', impact = 'low';
            if (bullishCount > bearishCount) { sentiment = 'bullish'; impact = bullishCount >= 2 ? 'high' : 'medium'; }
            else if (bearishCount > bullishCount) { sentiment = 'bearish'; impact = bearishCount >= 2 ? 'high' : 'medium'; }
            return { sentiment, impact };
        }

        function renderBatch() {
            const container = document.getElementById('newsList');
            const batch = allNews[currentTab].slice(displayedCount, displayedCount + BATCH_SIZE);
            
            if (displayedCount === 0) container.innerHTML = '';
            
            batch.forEach(news => {
                const html = `
                    <div class="news-item" onclick="openDetail('${encodeURIComponent(news.title_en)}', '${encodeURIComponent(news.title_zh)}', '${news.sentiment}', '${news.impact}', '${news.time}', '${encodeURIComponent(news.link)}')">
                        <div class="news-content">
                            <div class="news-titles">
                                <div class="news-title-zh ${news.sentiment}">${news.title_zh}</div>
                                <div class="news-title-en">${news.title_en}</div>
                                <div class="news-meta">${news.time} · ${currentTab === 'gold' ? '黄金快讯' : '川普动态'}</div>
                            </div>
                            <div class="news-sentiment ${news.sentiment}">${getSentimentText(news.sentiment)}(${getImpactText(news.impact)})</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            
            displayedCount += batch.length;
            document.getElementById('newsCount').textContent = `已加载 ${displayedCount} 条新闻`;
        }

        function openDetail(title_en, title_zh, sentiment, impact, time, link) {
            const params = new URLSearchParams();
            params.set('title_en', title_en); params.set('title_zh', title_zh);
            params.set('sentiment', sentiment); params.set('impact', impact);
            params.set('time', time); params.set('link', link);
            location.href = 'detail.html?' + params.toString();
        }

        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                if (displayedCount < allNews[currentTab].length) setTimeout(renderBatch, 300);
            }
        };

        loadPrices();
        loadNews('gold');
        loadNews('trump');
        setInterval(loadPrices, 600000);
    </script>
</body>
</html>
