<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>快讯详情 - 炒金宝</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:16px}
.back-btn{display:inline-block;color:#ffd700;font-size:14px;padding:8px 16px;background:rgba(255,215,0,0.1);border-radius:20px;margin-bottom:16px;cursor:pointer}
.badge{display:inline-block;font-size:13px;font-weight:600;padding:6px 14px;border-radius:6px;margin-bottom:16px}
.badge.bullish{background:rgba(248,113,113,0.2);color:#f87171}
.badge.bearish{background:rgba(74,222,128,0.2);color:#4ade80}
.badge.neutral{background:rgba(251,191,36,0.2);color:#fbbf24}
.card{background:#252542;border-radius:12px;padding:20px;margin-bottom:16px}
.title-zh{font-size:18px;font-weight:700;line-height:1.6;margin-bottom:8px}
.title-zh.bullish{color:#f87171}
.title-zh.bearish{color:#4ade80}
.title-zh.neutral{color:#fbbf24}
.title-en{font-size:14px;color:#888;line-height:1.5;margin-bottom:8px}
.time{font-size:12px;color:#666}
.section-title{font-size:16px;font-weight:600;color:#ffd700;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
.info-label{color:#888}
.val{font-weight:600}
.val.bullish{color:#f87171}
.val.bearish{color:#4ade80}
.val.neutral{color:#fbbf24}
.ai-box{background:#1f1f3a;border-radius:8px;padding:16px;margin-top:12px;border-left:3px solid #ffd700}
.ai-text{font-size:14px;color:#ddd;line-height:1.8}
.disclaimer{font-size:12px;color:#666;text-align:center;padding:20px}
.loading{text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<div class="container">
<div class="back-btn" onclick="location.href='index.html'">← 返回</div>
<div class="loading" id="loading">🤖 AI 分析中...</div>
<div id="content" style="display:none">
<div class="badge" id="badge">--</div>
<div class="card">
<div class="title-zh" id="titleZh"></div>
<div class="title-en" id="titleEn"></div>
<div class="time" id="time"></div>
</div>
<div class="card">
<div class="section-title">📈 AI 智能分析</div>
<div class="info-row"><span class="info-label">对金价影响</span><span class="val" id="direction">--</span></div>
<div class="info-row"><span class="info-label">影响程度</span><span class="val" id="level">--</span></div>
<div class="ai-box">
<div class="ai-text" id="aiText">--</div>
</div>
</div>
<div class="disclaimer">⚠️ 仅供参考，投资需谨慎</div>
</div>
</div>

<script>
(function(){
var params = location.search.substring(1);
var en = decodeURIComponent(params.replace('title_en=','').split('&')[0]) || '';
var zh = decodeURIComponent(params.replace('title_zh=','').split('&')[0]) || en;
var tm = params.indexOf('time=') > -1 ? params.split('time=')[1].split('&')[0] : '';

document.getElementById('titleZh').textContent = zh;
document.getElementById('titleEn').textContent = en;
document.getElementById('time').textContent = tm;

function analyze(news) {
var t = news.toLowerCase();
var score = 0;
var factors = [];

if (t.indexOf('tariff') > -1 || t.indexOf('impose') > -1) { score += 3; factors.push('关税政策'); }
if (t.indexOf('war') > -1 || t.indexOf('conflict') > -1 || t.indexOf('tension') > -1) { score += 3; factors.push('地缘冲突'); }
if (t.indexOf('peace') > -1 || t.indexOf('deal') > -1 || t.indexOf('agreement') > -1 || t.indexOf('ceasefire') > -1) { score -= 3; factors.push('达成协议'); }
if (t.indexOf('rate hike') > -1) { score += 1; }
if (t.indexOf('rate cut') > -1) { score -= 1; }
if (t.indexOf('inflation') > -1 || t.indexOf('cpi') > -1) { score += 2; factors.push('通胀数据'); }
if (t.indexOf('recession') > -1) { score += 2; factors.push('衰退风险'); }

var sentiment, direction, level, text;

if (score > 1) {
sentiment = 'bullish';
direction = '利多';
level = score > 3 ? '高' : '中';
var factorStr = factors.length > 0 ? factors.join('、') : '市场因素';
if (level === '高') {
text = '该消息涉及' + factorStr + '等因素，预计短期推动金价上涨。关税政策加剧贸易紧张，地缘风险上升，资金流向避险资产，建议关注回调做多机会。';
} else {
text = '该消息对黄金构成支撑，主要受' + factorStr + '影响。市场避险情绪升温，预计短期金价偏多运行，可考虑逢低布局。';
}
} else if (score < -1) {
sentiment = 'bearish';
direction = '利空';
level = score < -3 ? '高' : '中';
var factorStr = factors.length > 0 ? factors.join('、') : '市场因素';
if (level === '高') {
text = '该消息涉及' + factorStr + '等因素，预计短期大幅压低金价。地缘局势缓和降低避险需求，建议减仓观望，控制风险。';
} else {
text = '该消息对黄金构成压力，主要受' + factorStr + '影响。市场避险情绪消退，预计短期金价承压下行。';
}
} else {
sentiment = 'neutral';
direction = '中性';
level = '低';
text = '该消息属于常规信息，对黄金价格无明显方向指引。投资者保持观望，等待更多明确信号。建议维持原有投资策略。';
}

return { sentiment: sentiment, direction: direction, level: level, text: text };
}

var result = analyze(en);

document.getElementById('badge').textContent = result.direction + '(' + result.level + ')';
document.getElementById('badge').className = 'badge ' + result.sentiment;
document.getElementById('titleZh').className = 'title-zh ' + result.sentiment;
document.getElementById('direction').textContent = result.direction;
document.getElementById('direction').className = 'val ' + result.sentiment;
document.getElementById('level').textContent = result.level;
document.getElementById('aiText').textContent = result.text;

document.getElementById('loading').style.display = 'none';
document.getElementById('content').style.display = 'block';
})();
</script>
</body>
</html>
